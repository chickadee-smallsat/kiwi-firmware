<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kiwi Firmware — Interactive Flowchart</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3352;
      --accent: #4f8ef7;
      --accent2: #7c3aed;
      --accent3: #059669;
      --accent4: #d97706;
      --accent5: #dc2626;
      --accent6: #0891b2;
      --text: #e2e8f0;
      --muted: #64748b;
      --node-radius: 10px;
      --arrow: #4f8ef7;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 12px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; }
    header span { font-size: 0.8rem; color: var(--muted); }

    .controls {
      display: flex;
      gap: 8px;
      margin-left: auto;
      align-items: center;
    }
    .controls button {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 5px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: background 0.15s;
    }
    .controls button:hover { background: var(--border); }

    .legend {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      font-size: 0.72rem;
      color: var(--muted);
      align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 3px;
    }

    #canvas-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: grab;
      user-select: none;
    }
    #canvas-wrap.grabbing { cursor: grabbing; }

    svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Node styles */
    .node { cursor: pointer; }
    .node rect, .node ellipse, .node polygon {
      stroke-width: 1.5;
      transition: filter 0.15s;
    }
    .node:hover rect, .node:hover ellipse, .node:hover polygon {
      filter: brightness(1.25);
    }
    .node text {
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 11px;
      fill: white;
      dominant-baseline: middle;
      text-anchor: middle;
      pointer-events: none;
      user-select: none;
    }
    .node text.sub {
      font-size: 9px;
      fill: rgba(255,255,255,0.6);
    }

    /* Edge arrows */
    .edge path {
      stroke-width: 1.5;
      fill: none;
    }
    .edge text {
      font-size: 9px;
      fill: var(--muted);
    }

    /* Detail panel */
    #detail {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 320px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      z-index: 20;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    #detail h3 { font-size: 0.95rem; margin-bottom: 6px; }
    #detail .badge {
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin-bottom: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    #detail p { font-size: 0.8rem; color: var(--muted); line-height: 1.5; }
    #detail ul { font-size: 0.78rem; color: var(--muted); padding-left: 16px; line-height: 1.7; }
    #detail-close {
      float: right;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      line-height: 1;
    }

    .chip { display: inline-block; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 6px; font-size: 0.7rem; margin: 2px; color: var(--text); }

    /* Mini-map */
    #minimap {
      position: absolute;
      bottom: 20px;
      left: 20px;
      width: 160px;
      height: 100px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      z-index: 20;
    }
    #minimap svg { width: 100%; height: 100%; }

    /* ─── Task detail graph overlay ─── */
    #task-detail {
      position: fixed; inset: 0; background: rgba(5,7,15,0.93); z-index: 100;
      display: none; flex-direction: column;
    }
    #task-detail.active { display: flex; }
    #task-detail-header {
      background: #1a1d27; border-bottom: 1px solid #2e3352;
      padding: 10px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0;
    }
    #task-detail-title { font-size: 0.95rem; font-weight: 700; color: #e2e8f0; }
    #task-detail-sub { font-size: 0.75rem; color: #64748b; margin-left: 4px; }
    #task-detail-close {
      margin-left: auto; background: #22263a; border: 1px solid #2e3352;
      color: #e2e8f0; border-radius: 6px; padding: 4px 14px; cursor: pointer; font-size: 0.82rem;
    }
    #task-detail-close:hover { background: #2e3352; }
    #task-detail-body { flex: 1; overflow: hidden; cursor: grab; user-select: none; }
    #task-detail-body.grabbing { cursor: grabbing; }
    #task-detail-svg { width: 100%; height: 100%; display: block; }
    .dg-ext-label { font-size: 0.58rem; fill: rgba(255,255,255,0.4); letter-spacing: 0.08em; font-weight: 700; }
  </style>
</head>
<body>

<header>
  <h1>Kiwi Firmware — Interactive Flowchart</h1>
  <span>RP2350 · Embassy · Dual-core</span>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#4f8ef7"></div>Core 0 task</div>
    <div class="legend-item"><div class="legend-dot" style="background:#7c3aed"></div>Core 1 task</div>
    <div class="legend-item"><div class="legend-dot" style="background:#059669"></div>Sensor task</div>
    <div class="legend-item"><div class="legend-dot" style="background:#0891b2"></div>Channel / data flow</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d97706"></div>Hardware / peripheral</div>
  </div>
  <div class="controls">
    <button id="btn-back" onclick="exitFocus()" style="display:none;background:#1e1040;border-color:#7c3aed;color:#c4b5fd">← Back to Overview</button>
    <button onclick="resetView()">Reset View</button>
    <button onclick="zoomIn()">＋</button>
    <button onclick="zoomOut()">－</button>
  </div>
</header>

<div id="canvas-wrap">
  <svg id="svg" xmlns="http://www.w3.org/2000/svg">

      <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
        <path d="M0,0 L0,6 L8,3 z" fill="#4f8ef7" opacity="0.7"/>
      </marker>

        <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="world">
      <!-- all content rendered by JS -->
    </g>
  </svg>
</div>

<div id="detail">
  <button id="detail-close" onclick="closeDetail()">✕</button>
  <h3 id="d-title"></h3>
  <div class="badge" id="d-badge"></div>
  <p id="d-desc"></p>
  <div id="d-extra"></div>
</div>

<div id="minimap">
  <svg id="mm-svg" xmlns="http://www.w3.org/2000/svg">
    <g id="mm-world"></g>

  </svg>
</div>

<div id="task-detail">

      <button onclick="dgZoomOut()" style="background:#22263a;border:1px solid #2e3352;color:#e2e8f0;border-radius:6px;padding:4px 10px;cursor:pointer">－</button>
      <button onclick="dgResetView()" style="background:#22263a;border:1px solid #2e3352;color:#e2e8f0;border-radius:6px;padding:4px 10px;cursor:pointer">Reset</button>
      <button id="task-detail-close" onclick="closeDetailGraph()" style="background:#22263a;border:1px solid #2e3352;color:#e2e8f0;border-radius:6px;padding:4px 14px;cursor:pointer">&#x2715; Close Detail View</button>

  </div>

      </defs>
      <g id="task-detail-world"></g>
    </svg>
  </div>
</div>

// ─── Physics Renderer ────────────────────────────────────────────────────────
const wrap  = document.getElementById('canvas-wrap');
const world = document.getElementById('world');
document.getElementById('minimap').style.display = 'none';

// ─── Pan / Zoom State ────────────────────────────────────────────────────────
let scale = 1, panX = 0, panY = 0;
let panning = false, panLast = {x:0,y:0};

function applyTransform() {
  world.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
}

function screenToWorld(cx, cy) {
  const r = wrap.getBoundingClientRect();
  return { x:(cx - r.left - panX)/scale, y:(cy - r.top - panY)/scale };
}

// ─── Physics State ───────────────────────────────────────────────────────────
const phys = {};
NODES.forEach(n => {
  phys[n.id] = {
    px: n.x + (Math.random()-.5)*8,
    py: n.y + (Math.random()-.5)*8,
    ax: n.x, ay: n.y,
    vx: 0, vy: 0,
    pinned: false, el: null
  };
});

const SPRING_K  = 0.014;
const REPULSION = 14000;
const DAMPING   = 0.78;
const MAX_F     = 10;

function resetView() {
  const rect = wrap.getBoundingClientRect();
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  NODES.forEach(n=>{
    x0=Math.min(x0,n.x-n.w/2); y0=Math.min(y0,n.y-n.h/2);
    x1=Math.max(x1,n.x+n.w/2); y1=Math.max(y1,n.y+n.h/2);
  });
  scale = Math.min(rect.width/(x1-x0+140), rect.height/(y1-y0+140)) * 0.9;
  panX  = rect.width/2  - (x0+x1)/2*scale;
  panY  = rect.height/2 - (y0+y1)/2*scale;
  NODES.forEach(n=>{ const s=phys[n.id]; s.px=s.ax; s.py=s.ay; s.vx=0; s.vy=0; });
  applyTransform();
}
function zoomIn()  { scale=Math.min(scale*1.2,4);   applyTransform(); }
function zoomOut() { scale=Math.max(scale/1.2,0.1); applyTransform(); }

// ─── Pan / Zoom Events ───────────────────────────────────────────────────────
wrap.addEventListener('pointerdown', e => {
  if (e.target.closest('[data-node]')) return;
  panning=true; panLast={x:e.clientX,y:e.clientY};
  wrap.classList.add('grabbing');
  wrap.setPointerCapture(e.pointerId);
});
wrap.addEventListener('pointermove', e => {
  if (!panning) return;
  panX+=e.clientX-panLast.x; panY+=e.clientY-panLast.y;
  panLast={x:e.clientX,y:e.clientY};
  applyTransform();
});
wrap.addEventListener('pointerup', () => { panning=false; wrap.classList.remove('grabbing'); });
wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const r=wrap.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const f=e.deltaY<0?1.12:1/1.12;
  const ns=Math.max(0.1,Math.min(4,scale*f));
  panX=mx-(mx-panX)*ns/scale; panY=my-(my-panY)*ns/scale;
  scale=ns; applyTransform();
},{passive:false});

// ─── Node Elements ───────────────────────────────────────────────────────────
const nodeGroup = document.createElementNS('http://www.w3.org/2000/svg','g');
NODES.forEach(n => {
  const p=phys[n.id];

  g.setAttribute('transform',`translate(${p.px},${p.py})`);
  g.style.cursor='grab';
  const hw=n.w/2, hh=n.h/2;
  let shape;
  if(n.shape==='stadium'){

    shape.setAttribute('x',-hw); shape.setAttribute('y',-hh);
    shape.setAttribute('width',n.w); shape.setAttribute('height',n.h);
    shape.setAttribute('rx',hh); shape.setAttribute('ry',hh);
  } else if(n.shape==='hexagon'){
    const pts=[[-hw+10,-hh],[hw-10,-hh],[hw,0],[hw-10,hh],[-hw+10,hh],[-hw,0]]
      .map(v=>v.join(',')).join(' ');
    shape=document.createElementNS('http://www.w3.org/2000/svg','polygon');
    shape.setAttribute('points',pts);
  } else {
    shape=document.createElementNS('http://www.w3.org/2000/svg','rect');
    shape.setAttribute('x',-hw); shape.setAttribute('y',-hh);
    shape.setAttribute('width',n.w); shape.setAttribute('height',n.h);
    shape.setAttribute('rx','8'); shape.setAttribute('ry','8');
  }
  shape.setAttribute('fill',n.color); shape.setAttribute('stroke',n.stroke);
  shape.setAttribute('stroke-width','1.5');
  g.appendChild(shape);

  const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
  lbl.setAttribute('x','0'); lbl.setAttribute('y',n.sub?'-6':'0');
  lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('dominant-baseline','middle');
  lbl.setAttribute('font-family','Segoe UI,system-ui,sans-serif');
  lbl.setAttribute('font-size','11'); lbl.setAttribute('fill','white');
  lbl.setAttribute('pointer-events','none');
  lbl.textContent=n.label; g.appendChild(lbl);

  if(n.sub){
    const sub=document.createElementNS('http://www.w3.org/2000/svg','text');
    sub.setAttribute('x','0'); sub.setAttribute('y','8');
    sub.setAttribute('text-anchor','middle'); sub.setAttribute('dominant-baseline','middle');
    sub.setAttribute('font-family','Segoe UI,system-ui,sans-serif');
    sub.setAttribute('font-size','9'); sub.setAttribute('fill','rgba(255,255,255,0.6)');
    sub.setAttribute('pointer-events','none');
    sub.textContent=n.sub; g.appendChild(sub);
  }

  // Drag + click (pointer capture keeps events on the node during drag)
  g.addEventListener('pointerdown', e => {
    e.stopPropagation();
    p.pinned=true; p.vx=0; p.vy=0;
    g.style.cursor='grabbing';
    g.setPointerCapture(e.pointerId);
    let dragMoved=false;
    let lastW=screenToWorld(e.clientX,e.clientY);
    function onMove(ev){
      const w=screenToWorld(ev.clientX,ev.clientY);
      const dx=w.x-lastW.x, dy=w.y-lastW.y;
      if(Math.abs(dx)+Math.abs(dy)>1) dragMoved=true;
      p.px+=dx; p.py+=dy; lastW=w;
    }
    function onUp(ev){
      p.ax=p.px; p.ay=p.py; // anchor to dropped position — stops spring from pulling back
      p.pinned=false;
      p.vx=0; p.vy=0;
      g.style.cursor='grab';
      g.releasePointerCapture(ev.pointerId);
      if(!dragMoved) handleNodeClick(n);
      g.removeEventListener('pointermove',onMove);
      g.removeEventListener('pointerup',onUp);
    }
    g.addEventListener('pointermove',onMove);
    g.addEventListener('pointerup',onUp);
  });

  nodeGroup.appendChild(g);
  p.el=g;
});
world.appendChild(nodeGroup);

// ─── Edge Path Computation ───────────────────────────────────────────────────
function borderPt(n, ps, toX, toY){
  const dx=toX-ps.px, dy=toY-ps.py;
  const hw=n.w/2+4, hh=n.h/2+4;
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if(!ax&&!ay) return {x:ps.px,y:ps.py};
  let fx,fy;
  if(ax*hh>ay*hw){fx=dx>0?hw:-hw; fy=dy*hw/ax;}
  else            {fy=dy>0?hh:-hh; fx=dx*hh/ay;}
  return {x:ps.px+fx, y:ps.py+fy};
}

function updateEdges(){
  EDGES.forEach(e => {
    const fn_=NODES.find(n=>n.id===e.from), tn_=NODES.find(n=>n.id===e.to);
    if(!fn_||!tn_) return;
    const pf=phys[e.from], pt=phys[e.to];
    const sp=borderPt(fn_,pf,pt.px,pt.py);
    const ep=borderPt(tn_,pt,pf.px,pf.py);
    const mx=(sp.x+ep.x)/2, my=(sp.y+ep.y)/2;
    const ox=(ep.y-sp.y)*0.1, oy=-(ep.x-sp.x)*0.1;
    const m=edgeMeta[`${e.from}→${e.to}`];
    if(!m) return;
    m.path.setAttribute('d',`M${sp.x},${sp.y} Q${mx+ox},${my+oy} ${ep.x},${ep.y}`);
    if(m.txt){ m.txt.setAttribute('x',mx+ox*.5); m.txt.setAttribute('y',my+oy*.5-5); }
  });
}

// ─── Physics Step ────────────────────────────────────────────────────────────
function physicsStep(){
  // Spring toward anchor
  NODES.forEach(n => {
    const s=phys[n.id];
    if(s.pinned) return;
    s.vx+=(s.ax-s.px)*SPRING_K;
    s.vy+=(s.ay-s.py)*SPRING_K;
  });
  // Pairwise repulsion — nodes push apart when too close
  for(let i=0;i<NODES.length;i++){
    for(let j=i+1;j<NODES.length;j++){
      const a=NODES[i], b=NODES[j];
      const sa=phys[a.id], sb=phys[b.id];
      const dx=sb.px-sa.px, dy=sb.py-sa.py;
      const dist=Math.sqrt(dx*dx+dy*dy)||0.001;
      const minD=(a.w/2+b.w/2+a.h/2+b.h/2)*0.5+30;
      if(dist<minD*2.5){
        const f=Math.min(REPULSION/(dist*dist),MAX_F);
        const fx=dx/dist*f, fy=dy/dist*f;
        if(!sa.pinned){sa.vx-=fx; sa.vy-=fy;}
        if(!sb.pinned){sb.vx+=fx; sb.vy+=fy;}
      }
    }
  }
  // Integrate velocity + damping, update SVG transforms
  NODES.forEach(n => {
    const s=phys[n.id];
    if(!s.pinned){ s.vx*=DAMPING; s.vy*=DAMPING; s.px+=s.vx; s.py+=s.vy; }
    s.el.setAttribute('transform',`translate(${s.px},${s.py})`);
  });
  updateEdges();
}

// ─── Focus Mode ─────────────────────────────────────────────────────────────
let focusedId = null;
let focusRingEl = null;

function isTaskNode(n){ return n.core >= 0; }

function focusNeighbors(id){
  const s=new Set([id]);
  EDGES.forEach(e=>{ if(e.from===id) s.add(e.to); if(e.to===id) s.add(e.from); });
  return s;
}

function enterFocus(n){
  focusedId=n.id;
  const vis=focusNeighbors(n.id);

  // Fade irrelevant nodes
  NODES.forEach(nd=>{
    phys[nd.id].el.setAttribute('opacity', vis.has(nd.id)?'1':'0.06');
    phys[nd.id].el.style.pointerEvents = vis.has(nd.id)?'':'none';
  });

  // Show only edges touching the focal node
  EDGES.forEach(e=>{
    const m=edgeMeta[`${e.from}→${e.to}`];
    if(!m) return;
    const show=(e.from===n.id||e.to===n.id);
    m.g.setAttribute('opacity', show?'1':'0');
    // Make visible edge labels bolder
    if(show&&m.txt){ m.txt.setAttribute('font-size','9'); m.txt.setAttribute('opacity','1'); }
  });

  // Dashed focus ring drawn inside the focal node's group
  if(focusRingEl) focusRingEl.remove();
  focusRingEl=document.createElementNS('http://www.w3.org/2000/svg','rect');
  const hw=n.w/2+9, hh=n.h/2+9;
  focusRingEl.setAttribute('x',-hw); focusRingEl.setAttribute('y',-hh);
  focusRingEl.setAttribute('width',n.w+18); focusRingEl.setAttribute('height',n.h+18);
  focusRingEl.setAttribute('rx','14'); focusRingEl.setAttribute('ry','14');
  focusRingEl.setAttribute('fill','none');
  focusRingEl.setAttribute('stroke',n.stroke);
  focusRingEl.setAttribute('stroke-width','2');
  focusRingEl.setAttribute('stroke-dasharray','6 3');
  focusRingEl.setAttribute('opacity','0.9');
  focusRingEl.setAttribute('pointer-events','none');
  phys[n.id].el.insertBefore(focusRingEl, phys[n.id].el.firstChild);

  document.getElementById('btn-back').style.display='';
  openDetail(n);
  centerOn(n.id);
}

function exitFocus(){
  focusedId=null;
  if(focusRingEl){ focusRingEl.remove(); focusRingEl=null; }
  NODES.forEach(nd=>{
    phys[nd.id].el.setAttribute('opacity','1');
    phys[nd.id].el.style.pointerEvents='';
  });
  EDGES.forEach(e=>{
    const m=edgeMeta[`${e.from}→${e.to}`];
    if(m){ m.g.setAttribute('opacity','1'); if(m.txt){ m.txt.setAttribute('font-size','8'); m.txt.setAttribute('opacity','0.7'); } }
  });
  document.getElementById('btn-back').style.display='none';
  document.getElementById('detail').style.display='none';
}

function centerOn(id){
  const p=phys[id];
  const rect=wrap.getBoundingClientRect();
  scale=Math.min(1.8, Math.max(scale, 1.1));
  panX=rect.width/2  - p.px*scale;
  panY=rect.height/2 - p.py*scale;
  applyTransform();
}

function handleNodeClick(n){
  if(n.detail_graph){ openDetailGraph(n); return; }
  if(focusedId){
    if(n.id===focusedId){
      const d=document.getElementById('detail');
      if(d.style.display==='none') openDetail(n); else closeDetail();
    } else if(isTaskNode(n)){
      exitFocus(); enterFocus(n);
    } else {
      openDetail(n);
    }
  } else {
    if(isTaskNode(n)) enterFocus(n); else openDetail(n);
  }
}

// ─── Detail Graph Overlay ────────────────────────────────────────────────────
function dgBorderPt(nd, tx, ty){
  const cx=nd.cx, cy=nd.cy;
  const dx=tx-cx, dy=ty-cy;
  const hw=nd.w/2+3, hh=nd.h/2+3;
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if(!ax&&!ay) return {x:cx,y:cy};
  let fx,fy;
  if(ax*hh>ay*hw){fx=dx>0?hw:-hw; fy=dy*hw/ax;}
  else            {fy=dy>0?hh:-hh; fx=dx*hh/ay;}
  return {x:cx+fx,y:cy+fy};
}

// Mutable node positions for current detail graph (updated on drag)
let dgNodePos = {};
let dgEdgeMeta = {};
let dgCurrentDG = null;

function dgBorderPtId(id, toX, toY){
  const p=dgNodePos[id];
  const dx=toX-p.cx, dy=toY-p.cy;
  const hw=p.w/2+3, hh=p.h/2+3;
  const ax=Math.abs(dx), ay=Math.abs(dy);
  if(!ax&&!ay) return {x:p.cx,y:p.cy};
  let fx,fy;
  if(ax*hh>ay*hw){fx=dx>0?hw:-hw; fy=dy*hw/ax;}
  else            {fy=dy>0?hh:-hh; fx=dx*hh/ay;}
  return {x:p.cx+fx,y:p.cy+fy};
}

function dgUpdateAllEdges(){
  if(!dgCurrentDG) return;
  const vx0=dgCurrentDG._vx0, PAD=dgCurrentDG._PAD;
  dgCurrentDG.edges.forEach(e=>{
    const m=dgEdgeMeta[`${e.from}\u2192${e.to}`];
    if(!m) return;
    const fp=dgNodePos[e.from], tp=dgNodePos[e.to];
    if(!fp||!tp) return;
    if(e.loopback){
      const lx=vx0-PAD+14;
      const sp={x:fp.cx, y:fp.cy+fp.h/2};
      const ep={x:tp.cx-tp.w/2, y:tp.cy};
      m.path.setAttribute('d',`M${sp.x},${sp.y} L${sp.x},${sp.y+24} L${lx},${sp.y+24} L${lx},${ep.y} L${ep.x},${ep.y}`);
      if(m.lbl){m.lbl.setAttribute('x',lx+5); m.lbl.setAttribute('y',(sp.y+ep.y)/2);}
    } else {
      const sp=dgBorderPtId(e.from,tp.cx,tp.cy);
      const ep=dgBorderPtId(e.to,fp.cx,fp.cy);
      const mx=(sp.x+ep.x)/2, my=(sp.y+ep.y)/2;
      const ox=(ep.y-sp.y)*0.12, oy=-(ep.x-sp.x)*0.12;
      m.path.setAttribute('d',`M${sp.x},${sp.y} Q${mx+ox},${my+oy} ${ep.x},${ep.y}`);
      if(m.lbl){m.lbl.setAttribute('x',mx+ox*0.5); m.lbl.setAttribute('y',my+oy*0.5-6);}
    }
  });
}

function dgMarker(col){
  if(col==='#0891b2') return 'url(#dg-arr-cyan)';
  if(col==='#d97706') return 'url(#dg-arr-amber)';
  if(col==='#64748b') return 'url(#dg-arr-gray)';
  if(col==='#4f8ef7') return 'url(#dg-arr-blue)';
  if(col==='#7c3aed') return 'url(#dg-arr-purple)';
  if(col==='#dc2626') return 'url(#dg-arr-red)';
  return 'url(#dg-arr)';
}

// ─── Detail Graph Pan / Zoom ─────────────────────────────────────────────────
const dgSvgEl  = document.getElementById('task-detail-svg');
const dgWorld  = document.getElementById('task-detail-world');
const dgBody   = document.getElementById('task-detail-body');
let dgScale=1, dgPanX=0, dgPanY=0;
let dgPanning=false, dgLast={x:0,y:0}; // module-scope so node handler can reset them
let _dgVB = {x:0,y:0,w:800,h:600}; // stored after renderDetailGraph sets viewBox

function dgApplyTransform(){
  dgWorld.setAttribute('transform',`translate(${dgPanX},${dgPanY}) scale(${dgScale})`);
}
function dgResetView(){
  const vbStr=dgSvgEl.getAttribute('viewBox');
  if(vbStr){
    const [x,y,w,h]=vbStr.split(' ').map(Number);
    _dgVB={x,y,w,h};
  }
  const r=dgBody.getBoundingClientRect();
  dgScale=Math.min(r.width/_dgVB.w, r.height/_dgVB.h)*0.92;
  dgPanX=r.width/2  - (_dgVB.x+_dgVB.w/2)*dgScale;
  dgPanY=r.height/2 - (_dgVB.y+_dgVB.h/2)*dgScale;
  // Remove static viewBox so our transform drives positioning
  dgSvgEl.removeAttribute('viewBox');
  dgApplyTransform();
}
function dgZoomIn()  { dgScale=Math.min(dgScale*1.2,8);   dgApplyTransform(); }
function dgZoomOut() { dgScale=Math.max(dgScale/1.2,0.05); dgApplyTransform(); }

function renderDetailGraph(n){
  const dg=n.detail_graph;
  const svgEl=document.getElementById('task-detail-svg');
  const world=document.getElementById('task-detail-world');
  while(world.firstChild) world.removeChild(world.firstChild);
  dgEdgeMeta={};

  // Header
  document.getElementById('task-detail-title').textContent=n.title;
  const b=document.getElementById('task-detail-badge');
  b.textContent=n.badge; b.style.background=n.badgeColor; b.style.color='#fff';
  document.getElementById('task-detail-sub').textContent=dg.title||'';

  // ViewBox from node bounding box
  let vx0=Infinity,vy0=Infinity,vx1=-Infinity,vy1=-Infinity;
  dg.nodes.forEach(nd=>{
    vx0=Math.min(vx0,nd.cx-nd.w/2); vy0=Math.min(vy0,nd.cy-nd.h/2);
    vx1=Math.max(vx1,nd.cx+nd.w/2); vy1=Math.max(vy1,nd.cy+nd.h/2);
  });
  const PAD=55;
  svgEl.setAttribute('viewBox',`${vx0-PAD} ${vy0-PAD} ${vx1-vx0+PAD*2} ${vy1-vy0+PAD*2}`);
  const ns='http://www.w3.org/2000/svg';

  // Build mutable position store
  dgNodePos={};
  dg.nodes.forEach(nd=>{ dgNodePos[nd.id]={cx:nd.cx,cy:nd.cy,w:nd.w,h:nd.h,shape:nd.shape}; });
  dg._vx0=vx0; dg._PAD=PAD;
  dgCurrentDG=dg;

  // Section backgrounds
  (dg.sections||[]).forEach(s=>{
    const r=document.createElementNS(ns,'rect');
    r.setAttribute('x',s.x1); r.setAttribute('y',s.y1);
    r.setAttribute('width',s.x2-s.x1); r.setAttribute('height',s.y2-s.y1);
    r.setAttribute('rx','12'); r.setAttribute('fill',s.color);
    r.setAttribute('stroke',s.stroke); r.setAttribute('stroke-width','1');
    world.appendChild(r);
    const t=document.createElementNS(ns,'text');
    t.setAttribute('x',s.x1+10); t.setAttribute('y',s.y1+15);
    t.setAttribute('fill',s.stroke); t.setAttribute('font-size','9');
    t.setAttribute('font-weight','700'); t.setAttribute('letter-spacing','0.1em');
    t.setAttribute('font-family','Segoe UI,system-ui,sans-serif');
    t.textContent=s.label; world.appendChild(t);
  });

  // Edge layer (behind nodes)
  const edgeLayer=document.createElementNS(ns,'g');
  world.appendChild(edgeLayer);

  dg.edges.forEach(e=>{
    const col=e.color||'#059669';
    const fp=dgNodePos[e.from], tp=dgNodePos[e.to];
    if(!fp||!tp) return;
    const g=document.createElementNS(ns,'g');
    const path=document.createElementNS(ns,'path');
    path.setAttribute('fill','none');
    let lbl=null;
    if(e.loopback){
      const lx=vx0-PAD+14;
      const sp={x:fp.cx,y:fp.cy+fp.h/2};
      const ep={x:tp.cx-tp.w/2,y:tp.cy};
      path.setAttribute('d',`M${sp.x},${sp.y} L${sp.x},${sp.y+24} L${lx},${sp.y+24} L${lx},${ep.y} L${ep.x},${ep.y}`);
      path.setAttribute('stroke',col); path.setAttribute('stroke-width','2');
      path.setAttribute('stroke-dasharray','7 3'); path.setAttribute('opacity','0.65');
      path.setAttribute('marker-end',dgMarker(col));
      g.appendChild(path);
      if(e.label){
        lbl=document.createElementNS(ns,'text');
        lbl.setAttribute('x',lx+5); lbl.setAttribute('y',(sp.y+ep.y)/2);
        lbl.setAttribute('fill',col); lbl.setAttribute('font-size','8');
        lbl.setAttribute('font-family','Segoe UI,system-ui,sans-serif');
        lbl.textContent=e.label; g.appendChild(lbl);
      }
    } else {
      const sp=dgBorderPtId(e.from,tp.cx,tp.cy);
      const ep=dgBorderPtId(e.to,fp.cx,fp.cy);
      const mx=(sp.x+ep.x)/2,my=(sp.y+ep.y)/2;
      const ox=(ep.y-sp.y)*0.12,oy=-(ep.x-sp.x)*0.12;
      path.setAttribute('d',`M${sp.x},${sp.y} Q${mx+ox},${my+oy} ${ep.x},${ep.y}`);
      path.setAttribute('stroke',col); path.setAttribute('stroke-width','1.5');
      path.setAttribute('opacity','0.8'); path.setAttribute('marker-end',dgMarker(col));
      g.appendChild(path);
      if(e.label){
        lbl=document.createElementNS(ns,'text');
        lbl.setAttribute('x',mx+ox*0.5); lbl.setAttribute('y',my+oy*0.5-6);
        lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('fill',col);
        lbl.setAttribute('font-size','8.5'); lbl.setAttribute('font-family','Segoe UI,system-ui,sans-serif');
        lbl.textContent=e.label; g.appendChild(lbl);
      }
    }
    edgeLayer.appendChild(g);
    dgEdgeMeta[`${e.from}\u2192${e.to}`]={path,lbl};
  });

  // Node layer — each node is a translated <g> so dragging just updates transform
  dg.nodes.forEach(nd=>{
    const hw=nd.w/2, hh=nd.h/2;
    const g=document.createElementNS(ns,'g');
    g.setAttribute('transform',`translate(${nd.cx},${nd.cy})`);
    g.setAttribute('cursor','grab');
    g.setAttribute('data-dg-node','1');
    g.setAttribute('style','will-change:transform');

    let shape;
    if(nd.shape==='stadium'){
      shape=document.createElementNS(ns,'rect');
      shape.setAttribute('x',-hw); shape.setAttribute('y',-hh);
      shape.setAttribute('width',nd.w); shape.setAttribute('height',nd.h);
      shape.setAttribute('rx',hh);
    } else if(nd.shape==='hexagon'){
      const pts=[[-hw+10,-hh],[hw-10,-hh],[hw,0],[hw-10,hh],[-hw+10,hh],[-hw,0]]
        .map(v=>v[0]+','+v[1]).join(' ');
      shape=document.createElementNS(ns,'polygon');
      shape.setAttribute('points',pts);
    } else {
      shape=document.createElementNS(ns,'rect');
      shape.setAttribute('x',-hw); shape.setAttribute('y',-hh);
      shape.setAttribute('width',nd.w); shape.setAttribute('height',nd.h);
      shape.setAttribute('rx','8');
    }
    shape.setAttribute('fill',nd.color||'#0a2418');
    shape.setAttribute('stroke',nd.stroke||'#059669');
    shape.setAttribute('stroke-width','1.5');
    if(nd.ext){ shape.setAttribute('stroke-dasharray','5 3'); shape.setAttribute('opacity','0.9'); }
    g.appendChild(shape);

    const lbl=document.createElementNS(ns,'text');
    lbl.setAttribute('x','0'); lbl.setAttribute('y',nd.sub?'-7':'0');
    lbl.setAttribute('text-anchor','middle'); lbl.setAttribute('dominant-baseline','middle');
    lbl.setAttribute('font-size','11'); lbl.setAttribute('fill','white');
    lbl.setAttribute('pointer-events','none');
    lbl.setAttribute('font-family','Segoe UI,system-ui,sans-serif');
    lbl.textContent=nd.label; g.appendChild(lbl);

    if(nd.sub){
      const sub=document.createElementNS(ns,'text');
      sub.setAttribute('x','0'); sub.setAttribute('y','8');
      sub.setAttribute('text-anchor','middle'); sub.setAttribute('dominant-baseline','middle');
      sub.setAttribute('font-size','8'); sub.setAttribute('fill','rgba(255,255,255,0.5)');
      sub.setAttribute('pointer-events','none');
      sub.setAttribute('font-family','Segoe UI,system-ui,sans-serif');
      sub.textContent=nd.sub; g.appendChild(sub);
    }

    if(nd.ext){
      const badge=document.createElementNS(ns,'text');
      badge.setAttribute('x','0'); badge.setAttribute('y',(-hh-5)+'');
      badge.setAttribute('text-anchor','middle'); badge.setAttribute('font-size','7.5');
      badge.setAttribute('fill',nd.stroke); badge.setAttribute('font-weight','700');
      badge.setAttribute('letter-spacing','0.08em');
      badge.setAttribute('font-family','Segoe UI,system-ui,sans-serif');
      badge.setAttribute('pointer-events','none');
      badge.textContent='EXTERNAL'; g.appendChild(badge);
    }

    // ── Drag — node signals body via dgDragNode ──
    g.addEventListener('pointerdown', e=>{
      e.stopPropagation();
      e.preventDefault();
      dgPanning = false;      // cancel any in-flight pan
      dgDragNode={id:nd.id, g, lastX:e.clientX, lastY:e.clientY};
      dgBody.setPointerCapture(e.pointerId);
      g.setAttribute('cursor','grabbing');
    });

    world.appendChild(g);
  });
}

let dgDragNode = null; // { id, g, lastX, lastY } — set by node pointerdown

function openDetailGraph(n){
  renderDetailGraph(n);
  document.getElementById('task-detail').classList.add('active');
  dgResetView();
  // Wire all pointer + wheel events once
  if(!dgBody._dgEventsAttached){
    dgBody._dgEventsAttached = true;

    dgBody.addEventListener('pointerdown', e=>{
      if(dgDragNode) return;  // a node already claimed this pointer
      e.preventDefault();
      dgPanning=true; dgLast={x:e.clientX,y:e.clientY};
      dgBody.classList.add('grabbing');
      dgBody.setPointerCapture(e.pointerId);
    });

    dgBody.addEventListener('pointermove', e=>{
      if(dgDragNode){
        const dx=(e.clientX-dgDragNode.lastX)/dgScale;
        const dy=(e.clientY-dgDragNode.lastY)/dgScale;
        dgDragNode.lastX=e.clientX; dgDragNode.lastY=e.clientY;
        const p=dgNodePos[dgDragNode.id];
        p.cx+=dx; p.cy+=dy;
        dgDragNode.g.setAttribute('transform',`translate(${p.cx},${p.cy})`);
        dgUpdateAllEdges();
        return;
      }
      if(!dgPanning) return;
      dgPanX+=e.clientX-dgLast.x; dgPanY+=e.clientY-dgLast.y;
      dgLast={x:e.clientX,y:e.clientY};
      dgApplyTransform();
    });

    const dgEndInteraction = ()=>{
      if(dgDragNode){ dgDragNode.g.setAttribute('cursor','grab'); dgDragNode=null; }
      dgPanning=false;
      dgBody.classList.remove('grabbing');
    };
    dgBody.addEventListener('pointerup',     dgEndInteraction);
    dgBody.addEventListener('pointercancel', dgEndInteraction);

    dgBody.addEventListener('wheel', e=>{
      e.preventDefault();
      const r=dgBody.getBoundingClientRect();
      const mx=e.clientX-r.left, my=e.clientY-r.top;
      const f=e.deltaY<0?1.12:1/1.12;
      const ns=Math.max(0.1,Math.min(8,dgScale*f));
      dgPanX=mx-(mx-dgPanX)*(ns/dgScale);
      dgPanY=my-(my-dgPanY)*(ns/dgScale);
      dgScale=ns; dgApplyTransform();
    },{passive:false});
  }
}
function closeDetailGraph(){
  document.getElementById('task-detail').classList.remove('active');
}

// ─── Detail Panel ────────────────────────────────────────────────────────────
function openDetail(n){
  document.getElementById('detail').style.display='block';
  document.getElementById('d-title').textContent=n.title;
  const badge=document.getElementById('d-badge');
  badge.textContent=n.badge; badge.style.background=n.badgeColor; badge.style.color='#fff';
  document.getElementById('d-desc').textContent=n.desc;
  const extra=document.getElementById('d-extra');
  extra.innerHTML='';

  // Steps — numbered execution flow from source
  if(n.steps&&n.steps.length){
    const sec=document.createElement('div'); sec.style.marginTop='10px';
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:0.68rem;color:#64748b;margin-bottom:5px;font-weight:700;letter-spacing:0.07em';
    lbl.textContent='EXECUTION FLOW';
    sec.appendChild(lbl);
    const ol=document.createElement('ol');
    ol.style.cssText='font-size:0.75rem;color:#94a3b8;padding-left:0;list-style:none;margin:0';
    n.steps.forEach(s=>{
      const li=document.createElement('li');
      li.style.cssText='padding:2px 0 2px 0;white-space:pre-wrap;font-family:monospace;font-size:0.72rem;border-left:2px solid '+n.stroke+';padding-left:6px;margin-bottom:3px;color:#cbd5e1';
      li.textContent=s;
      ol.appendChild(li);
    });
    sec.appendChild(ol);
    extra.appendChild(sec);
  }

  // In focus mode, list connected nodes
  if(focusedId===n.id){
    const connEl=document.createElement('div');
    connEl.style.marginTop='10px';
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:0.68rem;color:#64748b;margin-bottom:4px;font-weight:700;letter-spacing:0.07em';
    lbl.textContent='CONNECTED TO';
    connEl.appendChild(lbl);
    EDGES.forEach(e=>{
      const otherId=(e.from===n.id)?e.to:(e.to===n.id)?e.from:null;
      if(!otherId) return;
      const other=NODES.find(x=>x.id===otherId);
      if(!other) return;
      const chip=document.createElement('span');
      chip.className='chip';
      chip.style.cssText+=`;border-color:${other.stroke};cursor:pointer`;
      const dir=e.from===n.id?'→':'←';
      chip.textContent=`${dir} ${other.label}${e.label?' ('+e.label+')':''}`;
      chip.addEventListener('click',()=>{ if(isTaskNode(other)){exitFocus();enterFocus(other);}else openDetail(other); });
      connEl.appendChild(chip);
    });
    extra.appendChild(connEl);
  }

  if(n.extra&&n.extra.length){
    const sec=document.createElement('div'); sec.style.marginTop='10px';
    const lbl=document.createElement('div');
    lbl.style.cssText='font-size:0.68rem;color:#64748b;margin-bottom:4px;font-weight:700;letter-spacing:0.07em';
    lbl.textContent='DETAILS';
    sec.appendChild(lbl);
    const ul=document.createElement('ul'); ul.style.cssText='font-size:0.78rem;color:#94a3b8;padding-left:16px;line-height:1.7;margin:0';
    n.extra.forEach(item=>{ const li=document.createElement('li'); li.textContent=item; ul.appendChild(li); });
    sec.appendChild(ul);
    extra.appendChild(sec);
  }
}
function closeDetail(){ document.getElementById('detail').style.display='none'; }

// ─── Init ────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resetView);
resetView();
requestAnimationFrame(function loop(){ physicsStep(); requestAnimationFrame(loop); });

// ─── Escape key handling ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Escape') return;
  const td = document.getElementById('task-detail');
  if (td && td.classList.contains('active')) { closeDetailGraph(); return; }
  const d = document.getElementById('detail');
  if (d && d.style.display !== 'none') { closeDetail(); }
});
</script>
