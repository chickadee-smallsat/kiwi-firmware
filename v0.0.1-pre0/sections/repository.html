/* Chevron */
.repo-chevron {
  display: inline-block;
  font-size: 0.58em;
  width: 0.85em;
  text-align: center;
  flex-shrink: 0;
  opacity: 0.45;

}
.repo-node--dir:hover .repo-chevron,
.repo-node--dir.repo-node--active .repo-chevron { opacity: 0.75; }
.repo-node--open .repo-chevron {

  opacity: 0.75;
}

/* Children slide */
.repo-children {
  display: grid;
  grid-template-rows: 0fr;
  transition: grid-template-rows 190ms ease;

  var SVG_FILE = '<svg class="repo-svg-icon repo-svg-icon--file" viewBox="0 0 16 16" aria-hidden="true"><path d="M2 1.75C2 .784 2.784 0 3.75 0h6.586c.464 0 .909.184 1.237.513l2.914 2.914c.329.328.513.773.513 1.237v9.586A1.75 1.75 0 0 1 13.25 16h-9.5A1.75 1.75 0 0 1 2 14.25zm1.75-.25a.25.25 0 0 0-.25.25v12.5c0 .138.112.25.25.25h9.5a.25.25 0 0 0 .25-.25V6h-2.75A1.75 1.75 0 0 1 9 4.25V1.5zm6.75.062V4.25c0 .138.112.25.25.25h2.688z"/></svg>';

  /* ── Helpers ───────────────────────────────────────────────────── */
  function esc(s) {
    return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
  }

  function setActive(btn) {
    if (active) active.classList.remove("repo-node--active");
    active = btn;
    btn.classList.add("repo-node--active");
  }

  function showInfo(node, isDir) {
    panel.innerHTML =
      '<p class="repo-info__name">' +
        (isDir ? SVG_DIR : SVG_FILE) + " " + esc(node.n) +
        '<span class="repo-info__badge repo-info__badge--' + (isDir ? "dir" : "file") + '">' +
          (isDir ? "directory" : "file") +
        "</span>" +
      "</p>" +
      '<p class="repo-info__desc">' + esc(node.d) + "</p>";
  }

  /* ── Recursive builder ─────────────────────────────────────────── */
  function build(items, parentUl) {
    items.forEach(function (node) {
      var isDir = node.t === "d";
      var li    = document.createElement("li");
      var btn   = document.createElement("button");
      btn.type      = "button";
      btn.className = "repo-node" + (isDir ? " repo-node--dir" : "");

      /* icon */
      btn.insertAdjacentHTML("beforeend", isDir ? SVG_DIR : SVG_FILE);

      /* chevron — visible for dirs, invisible spacer for files */
      var chev = document.createElement("span");
      chev.className = "repo-chevron";
      chev.setAttribute("aria-hidden", "true");
      if (isDir) chev.textContent = "\u25B6"; /* ▶ */
      btn.appendChild(chev);

      /* label */
      var label = document.createElement("span");
      label.textContent = node.n;
      btn.appendChild(label);

      li.appendChild(btn);

      if (isDir && node.c && node.c.length) {
        var wrap = document.createElement("div");
        wrap.className = "repo-children";
        var ul = document.createElement("ul");
        build(node.c, ul);
        wrap.appendChild(ul);
        li.appendChild(wrap);
        btn.setAttribute("aria-expanded", "false");

        btn.addEventListener("click", function () {
          var open = btn.classList.contains("repo-node--open");
          btn.classList.toggle("repo-node--open", !open);
          wrap.classList.toggle("repo-children--open", !open);
          btn.setAttribute("aria-expanded", String(!open));
          setActive(btn);
          showInfo(node, true);
        });
      } else {
        btn.addEventListener("click", function () {
          setActive(btn);
          showInfo(node, isDir);
        });
      }

      parentUl.appendChild(li);
    });
  }

  build(T, treeEl);
